services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alex-postgres
    restart: always
    environment:
      POSTGRES_USER: alex_user
      POSTGRES_PASSWORD: alex_password
      POSTGRES_DB: alex_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alex_user -d alex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Adminer (Web Database Management GUI)
  adminer:
    image: adminer:latest
    container_name: alex-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # Redis Cache & In-Memory Store
  redis:
    image: redis:7-alpine
    container_name: alex-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
