version: '3.8'

services:
  # PostgreSQL with pgvector extension enabled
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alex-postgres
    restart: always
    environment:
      POSTGRES_USER: alex_user
      POSTGRES_PASSWORD: alex_password
      POSTGRES_DB: alex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alex_user -d alex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend (FastAPI + LangGraph Orchestrator)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alex-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://alex_user:alex_password@postgres:5432/alex_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (Next.js App)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alex-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
